    <rect x="990" y="504" width="140" height="74" fill="#22271f" stroke="#30352c"/>
    <rect x="1150" y="504" width="140" height="74" fill="#22271f" stroke="#30352c"/>
    <text x="1010" y="532" fill="#747168" font-size="13" font-weight="900">OUTPUTS</text>
    <text x="1170" y="532" fill="#747168" font-size="13" font-weight="900">BLOCK</text>
