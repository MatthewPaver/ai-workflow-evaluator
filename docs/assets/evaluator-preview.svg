<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="860" viewBox="0 0 1440 860" role="img" aria-labelledby="title desc">
  <title id="title">AI Workflow Evaluator interface preview</title>
  <desc id="desc">A dark evaluation operations console showing suite health, quality gates, and trace-level LLM output decisions.</desc>
  <rect width="1440" height="860" fill="#0d0f0c"/>
  <radialGradient id="g1" cx="85%" cy="5%" r="70%">
    <stop offset="0" stop-color="#d9ff8c" stop-opacity=".18"/>
    <stop offset=".55" stop-color="#0d0f0c" stop-opacity="0"/>
  </radialGradient>
  <rect width="1440" height="860" fill="url(#g1)"/>
  <path d="M0 0h1440v860H0z" fill="none"/>
  <path d="M0 0h1440v860H0z" fill="url(#grid)"/>
  <defs>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0v28" fill="none" stroke="#20251d" stroke-width="1"/>
    </pattern>
  </defs>
  <g font-family="Avenir Next, Segoe UI, sans-serif">
