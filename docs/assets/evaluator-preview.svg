    <text x="154" y="326" fill="#fffaf0" font-family="Georgia, serif" font-size="96" font-weight="700">Decide what ships</text>
    <text x="154" y="423" fill="#fffaf0" font-family="Georgia, serif" font-size="96" font-weight="700">before the model</text>
    <text x="154" y="520" fill="#fffaf0" font-family="Georgia, serif" font-size="96" font-weight="700">reaches users.</text>
    <text x="154" y="574" fill="#aaa89e" font-size="22">Facts, source grounding, hallucination checks, latency, cost, and review status.</text>
    <rect x="948" y="150" width="392" height="474" fill="#1b1f18" stroke="#30352c" stroke-width="2"/>
    <text x="990" y="216" fill="#747168" font-size="15" font-weight="900" letter-spacing="2">SUITE HEALTH</text>
    <text x="1124" y="265" fill="#d9ff8c" font-size="86" font-weight="900">85%</text>
    <rect x="990" y="405" width="308" height="16" fill="#0a0b09" stroke="#515a49"/>
